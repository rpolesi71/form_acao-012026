<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Avaliação formação e ação - Prof. Reginaldo Polesi - Q04</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 15px; color: #333; }
        .container { max-width: 800px; background: white; margin: auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        h1 { 
            color: #444; 
            background-color: #f8f9fa; 
            border-bottom: 3px solid #ddd; 
            padding: 15px 10px; 
            text-align: center; 
            margin-bottom: 30px; 
            font-size: 24px; 
            border-radius: 8px; 
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-avaliacao {
            display: block;
            text-decoration: none;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }

        .btn-avaliacao:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Botão 01 - Estilo Verde (História e Programação) */
        .btn-q01 {
            background-color: #eafaf1;
            color: #27ae60;
            border-color: #27ae60;
        }
        .btn-q01:hover { background-color: #d4f5e2; }

        /* Botão 02 - Estilo Terroso (Grécia e Roma) */
        .btn-q02 {
            background-color: #FFD7B5;
            color: #D2691E;
            border-color: #D2691E;
        }
        .btn-q02:hover { background-color: #FFC08C; }

        /* Botão 03 - Estilo Azul (Pré-Socráticos) */
        .btn-q03 {
            background-color: #e8f0fe;
            color: #1a73e8;
            border-color: #1a73e8;
        }
        .btn-q03:hover { background-color: #d2e3fc; }

    </style>
</head>
<body>

<div class="container">
    <h1>
        2026 - Form Ação | 1tri | Lógica Computacional<br>
        Turma: NG - Rafael Roger Nora<br>
        Simulando uma Avaliação<br>
        <b>Escolha qual avaliação quer realizar</b><br>
        Prof. Reginaldo Polesi
    </h1>

    <div class="menu-grid">
        <a href="{link aqui}" class="btn-avaliacao btn-q01">
            01. História e Programação
        </a>

        <a href="{link aqui}" class="btn-avaliacao btn-q02">
            02. História da Grécia e Roma
        </a>

        <a href="{link aqui}" class="btn-avaliacao btn-q03">
            03. Os Pré-Socráticos
        </a>
    </div>
</div>

</body>
</html>
